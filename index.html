<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Processador de Quadros Pro</title>

<script async src="https://docs.opencv.org/4.x/opencv.js"></script>

<style>
:root { --primary:#2563eb; --secondary:#10b981; --bg:#f8fafc; }
body { font-family:Segoe UI; margin:0; display:flex; height:100vh; background:var(--bg); overflow:hidden; }
#sidebar { width:350px; background:white; padding:20px; display:flex; flex-direction:column; gap:15px; overflow-y:auto; }
#main-content { flex:1; display:flex; flex-direction:column; padding:20px; }
canvas,img { max-width:100%; max-height:70vh; }
.tab-content{display:none}
.tab-content.active{display:flex;flex-direction:column;align-items:center}
</style>
</head>

<body>

<div id="sidebar">
<input type="file" id="fileInput">
<input type="number" id="refMM" value="500">
<input type="number" id="ripaMM" value="15">
<input type="range" id="marginAdj" min="-50" max="50" value="0">
<input type="color" id="frameColor" value="#1a1a1a">
<input type="range" id="newFrameWidth" min="0" max="150" value="40">
<button id="processBtn">Processar</button>
</div>

<div id="main-content">
<img id="imgPreview">
<canvas id="canvasWarp"></canvas>
<canvas id="canvasCrop"></canvas>
<canvas id="canvasFinal"></canvas>
</div>

<script>

document.getElementById('fileInput').onchange = e=>{
    let reader = new FileReader();
    reader.onload = ev=>{
        document.getElementById('imgPreview').src = ev.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
};

document.getElementById('processBtn').onclick = ()=>{

    let imgEl = document.getElementById('imgPreview');
    if(!imgEl.src) return alert("Carregue uma imagem");

    let src = cv.imread(imgEl);
    let gray = new cv.Mat();

    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
    cv.GaussianBlur(gray, gray, new cv.Size(5,5),0);
    cv.Canny(gray, gray, 50,150);

    let contours = new cv.MatVector();
    let hierarchy = new cv.Mat();

    cv.findContours(gray, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

    let best = null, maxArea = 0;

    for(let i=0;i<contours.size();i++){
        let cnt = contours.get(i);
        let area = cv.contourArea(cnt);

        if(area>maxArea){
            let approx = new cv.Mat();
            cv.approxPolyDP(cnt, approx, 0.02*cv.arcLength(cnt,true), true);

            if(approx.rows===4){
                best = approx;
                maxArea = area;
            }
        }
    }

    if(!best){
        alert("Não detectado");
        return;
    }

    // ordenar pontos
    let pts=[];
    for(let i=0;i<4;i++){
        pts.push({x:best.data32S[i*2], y:best.data32S[i*2+1]});
    }

    pts.sort((a,b)=>a.y-b.y);
    let top=pts.slice(0,2).sort((a,b)=>a.x-b.x);
    let bot=pts.slice(2,4).sort((a,b)=>a.x-b.x);

    let p=[top[0],top[1],bot[1],bot[0]];

    let w=Math.max(
        Math.hypot(p[1].x-p[0].x,p[1].y-p[0].y),
        Math.hypot(p[2].x-p[3].x,p[2].y-p[3].y)
    );

    let h=Math.max(
        Math.hypot(p[3].x-p[0].x,p[3].y-p[0].y),
        Math.hypot(p[2].x-p[1].x,p[2].y-p[1].y)
    );

    let srcTri = cv.matFromArray(4,1,cv.CV_32FC2,[
        p[0].x,p[0].y,
        p[1].x,p[1].y,
        p[2].x,p[2].y,
        p[3].x,p[3].y
    ]);

    let dstTri = cv.matFromArray(4,1,cv.CV_32FC2,[0,0,w,0,w,h,0,h]);

    let M = cv.getPerspectiveTransform(srcTri,dstTri);

    let warped = new cv.Mat();
    cv.warpPerspective(src, warped, M, new cv.Size(w,h));

    cv.imshow('canvasWarp', warped);

    // cálculo ripa
    const refMM = parseFloat(document.getElementById('refMM').value);
    const ripaMM = parseFloat(document.getElementById('ripaMM').value);
    const offset = parseInt(document.getElementById('marginAdj').value);

    const scale = w / refMM;

    // leve margem extra para garantir remoção da moldura
    const ripaPx = Math.max(1, Math.round(ripaMM * scale) + offset);

    // ROI segura
    let x = Math.max(0, ripaPx);
    let y = Math.max(0, ripaPx);
    let cw = Math.max(1, w - 2*ripaPx);
    let ch = Math.max(1, h - 2*ripaPx);

    if(cw <= 0 || ch <= 0){
        alert("Ripa muito grande");
        return;
    }

    let rect = new cv.Rect(x,y,cw,ch);
    let cropped = warped.roi(rect);

    cv.imshow('canvasCrop', cropped);

    // nova moldura
    const fW = parseInt(document.getElementById('newFrameWidth').value);
    const color = document.getElementById('frameColor').value;

    const r = parseInt(color.slice(1,3),16);
    const g = parseInt(color.slice(3,5),16);
    const b = parseInt(color.slice(5,7),16);

    let final = new cv.Mat();

    cv.copyMakeBorder(
        cropped,
        final,
        fW,fW,fW,fW,
        cv.BORDER_CONSTANT,
        [r,g,b,255]
    );

    cv.imshow('canvasFinal', final);

    // CLEANUP CORRETO (SEM DUPLICAÇÃO)
    final.delete();
    cropped.delete();
    warped.delete();
    M.delete();
    srcTri.delete();
    dstTri.delete();

    src.delete();
    gray.delete();
    contours.delete();
    hierarchy.delete();
};

</script>

</body>
</html>
