<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processador de Quadros Pro</title>
    <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript"></script>
    <style>
        :root { --primary: #2563eb; --secondary: #10b981; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        /* Painel Esquerdo: Controles */
        #sidebar { width: 350px; background: white; border-right: 1px solid #e2e8f0; padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; box-shadow: 2px 0 5px rgba(0,0,0,0.05); }
        h2 { font-size: 1.2rem; margin-top: 0; color: #1e293b; border-bottom: 2px solid var(--primary); padding-bottom: 8px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.85rem; font-weight: 600; color: #64748b; }
        input[type="number"], input[type="file"], input[type="range"] { padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; }
        button { padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }

        /* Painel Direito: Abas e Visualização */
        #main-content { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow: hidden; }
        .tabs { display: flex; gap: 5px; margin-bottom: -1px; }
        .tab-btn { padding: 10px 20px; background: #e2e8f0; border: 1px solid #cbd5e1; border-bottom: none; cursor: pointer; border-radius: 8px 8px 0 0; font-size: 0.9rem; }
        .tab-btn.active { background: white; border-top: 3px solid var(--primary); font-weight: bold; }
        
        .tab-content { flex: 1; background: white; border: 1px solid #cbd5e1; display: none; align-items: center; justify-content: center; overflow: auto; padding: 20px; position: relative; }
        .tab-content.active { display: flex; flex-direction: column; }
        
        canvas, img { max-width: 100%; max-height: 70vh; object-fit: contain; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .info-overlay { margin-top: 15px; padding: 10px; background: #f1f5f9; border-radius: 6px; width: 100%; text-align: center; font-family: monospace; }
        .download-btn { margin-top: 10px; background: var(--secondary); padding: 8px 15px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Configurações</h2>
    
    <div class="control-group">
        <label>1. Carregar Foto</label>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="control-group">
        <label>Largura Referência (mm)</label>
        <input type="number" id="refMM" value="500">
    </div>

    <div class="control-group">
        <label>Espessura Ripa (mm)</label>
        <input type="number" id="ripaMM" value="15">
    </div>

    <div class="control-group">
        <label>Ajuste Fino de Margens (px)</label>
        <input type="range" id="marginAdj" min="-50" max="50" value="0">
        <small id="marginVal">Offset: 0px</small>
    </div>

    <hr style="width:100%; border:0; border-top:1px solid #eee">

    <div class="control-group">
        <label>Cor da Nova Moldura</label>
        <input type="color" id="frameColor" value="#1a1a1a">
    </div>

    <div class="control-group">
        <label>Largura Nova Moldura (px)</label>
        <input type="range" id="newFrameWidth" min="0" max="150" value="40">
    </div>

    <button id="processBtn">Processar Tudo</button>
    
    <div id="statsBox" class="info-overlay" style="display:none">
        <strong>Dimensões Calculadas</strong><br>
        <span id="txtExt"></span><br>
        <span id="txtInt"></span>
    </div>
</div>

<div id="main-content">
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'tabOriginal')">Original</button>
        <button class="tab-btn" onclick="openTab(event, 'tabWarp')">Planificada</button>
        <button class="tab-btn" onclick="openTab(event, 'tabCrop')">Sem Moldura</button>
        <button class="tab-btn" onclick="openTab(event, 'tabFinal')">Nova Moldura</button>
    </div>

    <div id="tabOriginal" class="tab-content active">
        <img id="imgPreview" style="display:none">
        <p>Aguardando imagem...</p>
    </div>

    <div id="tabWarp" class="tab-content">
        <canvas id="canvasWarp"></canvas>
        <button class="download-btn" onclick="download('canvasWarp', 'planificada.png')">Download PNG</button>
    </div>

    <div id="tabCrop" class="tab-content">
        <canvas id="canvasCrop"></canvas>
        <button class="download-btn" onclick="download('canvasCrop', 'arte_pura.png')">Download PNG</button>
    </div>

    <div id="tabFinal" class="tab-content">
        <canvas id="canvasFinal"></canvas>
        <button class="download-btn" onclick="download('canvasFinal', 'novo_quadro.png')">Download PNG</button>
    </div>
</div>

<script>
    let srcMat = null;

    // Sistema de Abas
    function openTab(evt, tabId) {
        let contents = document.getElementsByClassName("tab-content");
        for (let c of contents) c.classList.remove("active");
        let btns = document.getElementsByClassName("tab-btn");
        for (let b of btns) b.classList.remove("active");
        document.getElementById(tabId).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    // Leitura do arquivo
    document.getElementById('fileInput').onchange = function(e) {
        let reader = new FileReader();
        reader.onload = function(event) {
            let img = document.getElementById('imgPreview');
            img.src = event.target.result;
            img.style.display = "block";
            document.querySelector('#tabOriginal p').style.display = "none";
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    document.getElementById('marginAdj').oninput = function() {
        document.getElementById('marginVal').innerText = `Offset: ${this.value}px`;
    };

    // Processamento
    document.getElementById('processBtn').onclick = function() {
        let imgEl = document.getElementById('imgPreview');
        if (!imgEl.src) return alert("Suba uma imagem primeiro!");
        
        let src = cv.imread(imgEl);
        let gray = new cv.Mat();
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
        cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0);
        cv.Canny(gray, gray, 50, 150);

        let contours = new cv.MatVector();
        let hierarchy = new cv.Mat();
        cv.findContours(gray, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

        let maxArea = 0; let bestCnt = null;
        for (let i = 0; i < contours.size(); ++i) {
            let cnt = contours.get(i);
            let area = cv.contourArea(cnt);
            if (area > maxArea) {
                let approx = new cv.Mat();
                cv.approxPolyDP(cnt, approx, 0.02 * cv.arcLength(cnt, true), true);
                if (approx.rows == 4) { maxArea = area; bestCnt = approx; }
            }
        }

        if (bestCnt) {
            // 1. Organizar Pontos
            let pts = [];
            for(let i=0; i<4; i++) pts.push({x: bestCnt.data32S[i*2], y: bestCnt.data32S[i*2+1]});
            pts.sort((a,b) => a.y - b.y);
            let top = pts.slice(0,2).sort((a,b) => a.x - b.x);
            let bot = pts.slice(2,4).sort((a,b) => a.x - b.x);
            let sorted = [top[0], top[1], bot[1], bot[0]];

            let w = Math.max(Math.hypot(sorted[1].x-sorted[0].x, sorted[1].y-sorted[0].y), Math.hypot(sorted[2].x-sorted[3].x, sorted[2].y-sorted[3].y));
            let h = Math.max(Math.hypot(sorted[3].x-sorted[0].x, sorted[3].y-sorted[0].y), Math.hypot(sorted[2].x-sorted[1].x, sorted[2].y-sorted[1].y));

            // 2. Planificar
            let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [sorted[0].x, sorted[0].y, sorted[1].x, sorted[1].y, sorted[2].x, sorted[2].y, sorted[3].x, sorted[3].y]);
            let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, w, 0, w, h, 0, h]);
            let M = cv.getPerspectiveTransform(srcTri, dstTri);
            let warped = new cv.Mat();
            cv.warpPerspective(src, warped, M, new cv.Size(w, h));
            cv.imshow('canvasWarp', warped);

            // 3. Cálculos
            const refMM = parseFloat(document.getElementById('refMM').value);
            const ripaMM = parseFloat(document.getElementById('ripaMM').value);
            const offset = parseInt(document.getElementById('marginAdj').value);
            const scale = w / refMM;
            const ripaPx = Math.round(ripaMM * scale) + offset;

            document.getElementById('statsBox').style.display = "block";
            document.getElementById('txtExt').innerText = `Externo: ${refMM} x ${(h/scale).toFixed(1)} mm`;
            document.getElementById('txtInt').innerText = `Interno: ${((w-2*ripaPx)/scale).toFixed(1)} x ${((h-2*ripaPx)/scale).toFixed(1)} mm`;

            // 4. Corte (Extração da Arte Pura - SEM a moldura original)
            // O ripaPx define quanto vamos "entrar" na imagem para ignorar a moldura
            let rect = new cv.Rect(ripaPx, ripaPx, w - 2 * ripaPx, h - 2 * ripaPx);
            
            // Segurança: Garante que o retângulo de corte não seja inválido ou negativo
            if (rect.width > 0 && rect.height > 0) {
                let cropped = warped.roi(rect);
                cv.imshow('canvasCrop', cropped);

                // 5. Nova Moldura (Aplicada sobre a arte já limpa)
                const fW = parseInt(document.getElementById('newFrameWidth').value);
                const color = document.getElementById('frameColor').value;
                const r = parseInt(color.slice(1,3), 16), 
                      g = parseInt(color.slice(3,5), 16), 
                      b = parseInt(color.slice(5,7), 16);
                
                let final = new cv.Mat();
                // A função copyMakeBorder ADICIONA bordas novas ao redor da imagem limpa
                cv.copyMakeBorder(cropped, final, fW, fW, fW, fW, cv.BORDER_CONSTANT, [r, g, b, 255]);
                cv.imshow('canvasFinal', final);

                // Cleanup das matrizes específicas deste bloco
                final.delete();
                cropped.delete(); 
            } else {
                console.error("Erro: O valor da Ripa é maior que a própria imagem.");
            }

            // Cleanup
            warped.delete(); cropped.delete(); final.delete(); M.delete();
        } else {
            alert("Moldura não detectada. Tente uma foto com fundo contrastante.");
        }
        src.delete(); gray.delete(); contours.delete(); hierarchy.delete();
    };

    function download(id, name) {
        let link = document.createElement('a');
        link.download = name;
        link.href = document.getElementById(id).toDataURL();
        link.click();
    }
</script>

</body>
</html>
